services:
  - type: web
    name: mango-api
    runtime: docker
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: AI_SERVICE_URL
        sync: false

  - type: web
    name: mango-ai
    runtime: docker
    dockerfilePath: ./Dockerfile.ai
    plan: starter
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
